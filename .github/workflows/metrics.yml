name: Metrics
on:
  # 更新頻度: 毎日 0:00 UTC（= 日本時間 9:00）。重ければ "0 0 * * 0"（週1・日曜）に変えてOK
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:        # 手動実行ボタンを有効化

permissions:
  contents: write           # 生成したSVGを自動コミットするのに必要

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: 0kgg
          filename: github-metrics.svg
          template: classic

          # ── 基本（About me / Activity / Community stats / Repositories）──
          base: header, activity, community, repositories, metadata

          # ── 言語 ──
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: tex, less, qmake, lex, gnuplot

          # ── 等角コントリビューションカレンダー ──
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Issue / PR の集計（画像の "Overall issues and pull requests status"）──
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes

          # ── 注目リポジトリ ──
          plugin_notable: yes